spring:
  application:
    name: lendstack-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:lendstack}
    username: ${DB_USER:lendstack}
    password: ${DB_PASSWORD:lendstack}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: Africa/Lagos
  flyway:
    enabled: true
    locations: classpath:db/migration
    placeholders:
      # CBN-configurable defaults — seeded into system_config on first migration,
      # editable afterwards by ADMIN through the API (audited). Nothing hardcoded.
      interestRateCapAnnual: ${CBN_INTEREST_RATE_CAP_ANNUAL:30.00}
      minTenureMonths: ${CBN_MIN_TENURE_MONTHS:1}
      maxTenureMonths: ${CBN_MAX_TENURE_MONTHS:24}
      penaltyRateDailyPercent: ${PENALTY_RATE_DAILY_PERCENT:0.25}
      gracePeriodDays: ${GRACE_PERIOD_DAYS:3}
      collateralThreshold: ${COLLATERAL_THRESHOLD_NGN:2000000}
      guarantorTier1Max: ${GUARANTOR_TIER1_MAX_NGN:500000}
      guarantorTier2Max: ${GUARANTOR_TIER2_MAX_NGN:2000000}
      guarantorExpiryHours: ${GUARANTOR_EXPIRY_HOURS:72}
      maxLoanAmount: ${MAX_LOAN_AMOUNT_NGN:10000000}
      minLoanAmount: ${MIN_LOAN_AMOUNT_NGN:50000}
      defaultInterestRateAnnual: ${DEFAULT_INTEREST_RATE_ANNUAL:24.00}
      daysToDefault: ${DELINQUENT_DAYS_TO_DEFAULT:90}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never

lendstack:
  security:
    jwt:
      # HS256 signing key — MUST be overridden in every environment (min 32 bytes)
      secret: ${JWT_SECRET:}
      access-token-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:60}
    encryption:
      # AES-256-GCM key (Base64, 32 bytes) for PII columns (BVN, NIN, bank account)
      pii-key: ${PII_ENCRYPTION_KEY:}
  paystack:
    secret-key: ${PAYSTACK_SECRET_KEY:}
    base-url: ${PAYSTACK_BASE_URL:https://api.paystack.co}
    callback-url: ${PAYSTACK_CALLBACK_URL:http://localhost:3000/borrower/repayments/callback}
  storage:
    # Local document storage root (mounted volume in Docker)
    document-dir: ${DOCUMENT_STORAGE_DIR:./data/documents}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  # Used to build links in outbound notifications (e.g. guarantor accept/decline pages)
  frontend-base-url: ${FRONTEND_BASE_URL:http://localhost:3000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  config: classpath:logback-spring.xml
